<!DOCTYPE html>
<html lang="en" class="auth-gate" data-auth-page="login">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StanzaHR - Forgot Password</title>
  <style>html.auth-gate body{visibility:hidden}</style>
  <script src="js/auth-gate.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>StanzaHR</h1>
        <p id="forgotOrgContext">Reset your password</p>
      </div>
      <form id="forgotForm" autocomplete="off">
        <div class="form-group">
          <label for="forgotEmail">Email</label>
          <input type="email" id="forgotEmail" required placeholder="Enter your account email">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
      </form>
      <p class="auth-switch">
        <a href="/login">Back to Sign In</a>
      </p>
    </div>
  </div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <script src="js/routes.js"></script>
  <script src="js/org.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (typeof requireOrgOrRedirect === 'function' && !requireOrgOrRedirect()) {
      // redirected
    } else {
      const ctx = document.getElementById('forgotOrgContext');
      if (ctx && typeof getOrgName === 'function' && getOrgName()) {
        ctx.textContent = `Reset password for ${getOrgName()}`;
      }
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value.trim();
      const org_key = typeof getOrgKey === 'function' ? getOrgKey() : '';
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      showToast('Sending reset link...', 'neutral');
      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, org_key })
        });
        const json = await readResponse(res);
        if (!res.ok) {
          showToast(json.error || 'Request failed', 'error');
          return;
        }
        showToast(json.message || 'Check your email for a reset link.', 'success', { duration: 6000 });
        e.target.reset();
      } catch (err) {
        showToast('Network error', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
