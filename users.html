<!DOCTYPE html>
<html lang="en" class="auth-gate" data-auth-page="protected">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StanzaHR - Users</title>
  <style>html.auth-gate body{visibility:hidden}</style>
  <script src="js/auth-gate.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-page">
  <nav class="navbar">
    <div class="nav-brand">StanzaHR</div>
    <div class="nav-user">
      <span id="userName"></span>
      <div class="settings-menu">
        <button class="btn btn-sm btn-outline settings-btn" id="settingsBtn" type="button" aria-label="Settings">⚙</button>
        <div class="settings-dropdown" id="settingsDropdown">
          <a href="/users" class="settings-item">Users</a>
          <button type="button" class="settings-item" onclick="signOut()">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="dashboard">
    <aside class="sidebar">
      <nav>
        <a href="/dashboard" class="nav-item">Mark Attendance</a>
        <a href="/dashboard" class="nav-item">View Records</a>
        <a href="/dashboard" class="nav-item">Masters</a>
        <a href="/users" class="nav-item active">Users</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="section-header">
        <h2>User Management</h2>
        <div class="section-header-actions">
          <button class="btn btn-primary btn-sm" id="btnAddUser" type="button">+ Create Account</button>
          <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
        </div>
      </div>
      <p class="section-desc">Create accounts and manage admin access for your organization.</p>

      <div id="addUserForm" class="form-panel" style="display:none;">
        <h3>Create User Account</h3>
        <form id="userForm">
          <div class="form-row">
            <div class="form-group">
              <label for="userName">Full Name</label>
              <input type="text" id="newUserName" required placeholder="Full name">
            </div>
            <div class="form-group">
              <label for="newUserEmail">Email</label>
              <input type="email" id="newUserEmail" required placeholder="Email address">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="newUserPassword">Password</label>
              <input type="password" id="newUserPassword" required placeholder="Temporary password">
              <small class="field-hint" id="newUserPasswordHint"></small>
            </div>
            <div class="form-group checkbox-group" style="align-self:flex-end;">
              <label class="checkbox-label">
                <input type="checkbox" id="newUserAdmin"> Grant admin access
              </label>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Account</button>
            <button type="button" class="btn btn-secondary" id="btnCancelUser">Cancel</button>
          </div>
        </form>
      </div>

      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Verified</th>
              <th>Admin</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr><td colspan="5" class="text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <script src="js/routes.js"></script>
  <script src="js/org.js"></script>
  <script src="js/password.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/users.js"></script>
</body>
</html>
