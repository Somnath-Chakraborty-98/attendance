<!DOCTYPE html>
<html lang="en" class="auth-gate" data-auth-page="login">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StanzaHR - Login</title>
  <style>html.auth-gate body{visibility:hidden}</style>
  <script src="js/auth-gate.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>StanzaHR</h1>
        <p id="orgContext">Log in to manage workforce attendance</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
      <p class="auth-switch auth-forgot">
        <a href="/forgot-password">Forgot password?</a>
      </p>
      <p class="auth-switch">
        <a href="/" id="changeOrg">Change organization</a>
      </p>
    </div>
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <script src="js/routes.js"></script>
  <script src="js/org.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
