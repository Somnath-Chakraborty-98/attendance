<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StanzaHR - Reset Password</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>StanzaHR</h1>
        <p>Set a new password</p>
      </div>
      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" required placeholder="Enter new password">
          <small class="field-hint" id="passwordHint"></small>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" required placeholder="Confirm new password">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Update Password</button>
      </form>
      <p class="auth-switch">
        <a href="/login">Back to Sign In</a>
      </p>
    </div>
  </div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <script src="js/routes.js"></script>
  <script src="js/password.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    const hint = document.getElementById('passwordHint');
    if (hint && typeof passwordHint === 'function') hint.textContent = passwordHint();

    if (!token) {
      showToast('Invalid reset link.', 'error');
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!token) return;

      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const btn = e.target.querySelector('button[type="submit"]');

      const pwdErr = passwordErrorMessage(password);
      if (pwdErr) {
        showToast(pwdErr, 'error');
        return;
      }
      if (password !== confirm) {
        showToast('Passwords do not match.', 'error');
        return;
      }

      btn.disabled = true;
      showToast('Updating password...', 'neutral');
      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const json = await readResponse(res);
        if (!res.ok) {
          showToast(json.error || 'Reset failed', 'error');
          return;
        }
        showToast('Password updated! Redirecting to sign in...', 'success', { duration: 3000 });
        setTimeout(() => { window.location.href = ROUTES.login; }, 1500);
      } catch (err) {
        showToast('Network error', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
